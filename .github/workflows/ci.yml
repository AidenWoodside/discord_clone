name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  lint-pr-title:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            fix
            feat
            chore
            ci
            docs
            deps
            refactor
            test
            perf
            revert

  check-paths:
    runs-on: ubuntu-latest
    outputs:
      client: ${{ steps.filter.outputs.client }}
      server: ${{ steps.filter.outputs.server }}
      shared: ${{ steps.filter.outputs.shared }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            client:
              - 'client/**'
            server:
              - 'server/**'
            shared:
              - 'shared/**'
              - 'package-lock.json'
              - 'tsconfig.base.json'
            infra:
              - 'infrastructure/**'

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build -w shared

      - name: Lint
        run: npm run lint

  test-client:
    runs-on: ubuntu-latest
    needs: [check-paths]
    if: needs.check-paths.outputs.client == 'true' || needs.check-paths.outputs.shared == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build -w shared

      - name: Test shared
        run: npm test -w shared

      - name: Test client
        run: npm test -w client

      - name: Client coverage check
        run: npm run test:coverage -w client

      - name: Build client
        run: npm run build -w client

  test-server:
    runs-on: ubuntu-latest
    needs: [check-paths]
    if: needs.check-paths.outputs.server == 'true' || needs.check-paths.outputs.shared == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build -w shared

      - name: Test shared
        run: npm test -w shared

      - name: Test server
        run: npm test -w server

      - name: Server coverage check
        run: npm run test:coverage -w server

      - name: Build server
        run: npm run build -w server

      - name: Validate Docker Compose config
        run: |
          cp .env.example .env
          echo "IMAGE_TAG=ci-test" >> .env
          docker compose config --quiet
          rm .env

  terraform-validate:
    runs-on: ubuntu-latest
    needs: [check-paths]
    if: needs.check-paths.outputs.infra == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v4
      - name: Terraform Init (no backend)
        run: cd infrastructure && terraform init -backend=false
      - name: Terraform Validate
        run: cd infrastructure && terraform validate
      - name: Terraform Format Check
        run: cd infrastructure && terraform fmt -check -recursive
