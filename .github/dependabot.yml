version: 2
updates:
  # GitHub Actions — keep action SHAs current
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
      - "ci"

  # Docker — server Dockerfile base image (node:20-alpine)
  - package-ecosystem: "docker"
    directory: "/server"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "docker"
    labels:
      - "dependencies"
      - "docker"

  # Docker — compose file pinned images (nginx, coturn, certbot)
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "docker"
    labels:
      - "dependencies"
      - "docker"

  # npm — root workspace dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
    groups:
      production-dependencies:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # npm — server dependencies
  - package-ecosystem: "npm"
    directory: "/server"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
    groups:
      production-dependencies:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
